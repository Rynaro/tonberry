name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Required for manual runs."
        required: true
      skip_image:
        description: "Skip the container build/push and only (re)attach release assets to an already-published image. Use to add the Eidolon-release asset contract to a tag whose image digest is already pinned downstream — without changing the digest."
        type: boolean
        default: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/tonberry

jobs:
  # ── Multi-arch image: build each platform on its NATIVE runner, then merge ──
  # arm64 is a MUST (the Apple-Silicon trap: an amd64-only image fails docker
  # pull on Apple Silicon and breaks `eidolons mcp install tonberry`). Build
  # linux/amd64 on ubuntu-latest and linux/arm64 on the native ubuntu-24.04-arm
  # runner, push each by digest (no tag), then assemble a manifest list in the
  # merge job. The roster pins the multi-arch INDEX digest (not a per-arch one).
  build-image:
    name: Build ${{ matrix.platform }} image
    runs-on: ${{ matrix.runner }}
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_image == false }}
    permissions:
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Compute lowercase image name
        id: imgname
        run: |
          lower=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${{ env.REGISTRY }}/$lower" >> "$GITHUB_OUTPUT"

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push by digest (distroless static, native arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          # push-by-digest: no tag here; the merge job assembles the tagged
          # manifest list. provenance/sbom off — they create extra manifests
          # that complicate imagetools create; attestation is on the
          # Eidolon-release artefacts (github-release job), not the image.
          provenance: false
          sbom: false
          outputs: type=image,name=${{ steps.imgname.outputs.image }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-image:
    name: Merge multi-arch manifest list
    needs: [build-image]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_image == false }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.merge.outputs.digest }}
    steps:
      - name: Resolve version
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.tag }}"
          else
            version="${{ github.ref_name }}"
          fi
          echo "version=${version#v}" >> "$GITHUB_OUTPUT"

      - name: Compute lowercase image name
        id: imgname
        run: |
          lower=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${{ env.REGISTRY }}/$lower" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create + push manifest list
        id: merge
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          image="${{ steps.imgname.outputs.image }}"
          version="${{ steps.ref.outputs.version }}"
          # shellcheck disable=SC2046,SC2086
          docker buildx imagetools create \
            -t "${image}:${version}" \
            -t "${image}:latest" \
            $(printf "${image}@sha256:%s " *)
          digest="$(docker buildx imagetools inspect "${image}:${version}" \
            --format '{{json .Manifest}}' | jq -r '.digest')"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Published multi-arch ${image}:${version} @ ${digest}"
          docker buildx imagetools inspect "${image}:${version}" | grep -i platform || true

  github-release:
    name: Create GitHub release + Eidolon asset contract
    needs: [merge-image]
    if: ${{ always() && (needs.merge-image.result == 'success' || needs.merge-image.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - name: Build release metadata (Eidolon-release contract)
        id: meta
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          version="${tag#v}"
          mkdir -p dist
          git archive --format=tar --prefix="tonberry-${version}/" HEAD -o dist/source.tar
          archive_sha="$(sha256sum dist/source.tar | awk '{print $1}')"
          commit="$(git rev-parse HEAD)"
          tree="$(git rev-parse 'HEAD^{tree}')"
          jq -n \
            --arg name "tonberry" \
            --arg version "$version" \
            --arg tag "$tag" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg commit "$commit" \
            --arg tree "$tree" \
            --arg archive_sha "$archive_sha" \
            --arg workflow ".github/workflows/release.yml" \
            '{
              name: $name,
              version: $version,
              tag: $tag,
              source: { type: "github", repo: $repo },
              commit: $commit,
              tree: $tree,
              archive_sha256: $archive_sha,
              manifest_sha256: null,
              provenance: {
                github_attestation: true,
                workflow: $workflow
              }
            }' > dist/release-manifest.json
          (cd dist && sha256sum source.tar release-manifest.json > SHA256SUMS)

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/*

      - name: Publish GitHub release + assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          assets="dist/source.tar dist/release-manifest.json dist/SHA256SUMS"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            # shellcheck disable=SC2086
            gh release upload "$tag" $assets --repo "$GITHUB_REPOSITORY" --clobber
          else
            # shellcheck disable=SC2086
            gh release create "$tag" $assets \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --generate-notes
          fi
